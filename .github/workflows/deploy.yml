name: CI/CD — Build, Test, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: pe-copilot-dev
  GCP_REGION: europe-west2
  SERVICE_NAME: pe-copilot-api
  REGISTRY: europe-west2-docker.pkg.dev

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true  # Don't block deploys on type errors during MVP

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Use mock/test settings
          API_KEY: test-key
          GCP_PROJECT_ID: test-project
          ANTHROPIC_API_KEY: test-key

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/pe-copilot/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/pe-copilot/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}"
